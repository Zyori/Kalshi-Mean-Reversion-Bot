server {
    listen 80;
    server_name mrb.lutz.bot;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mrb.lutz.bot;

    # SSL certs — adjust paths to match your certbot/acme setup
    ssl_certificate     /etc/letsencrypt/live/mrb.lutz.bot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mrb.lutz.bot/privkey.pem;

    # Dashboard static files
    root /opt/kalshi-mrb/dashboard/dist;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI docs
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
