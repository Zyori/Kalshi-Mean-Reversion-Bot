# HTTP -> HTTPS redirect for both hosts.
server {
    listen 80;
    server_name mrb.lutz.bot lutz.bot www.lutz.bot;
    return 301 https://$host$request_uri;
}

# Admin backend dashboard — authed views, full API.
server {
    listen 443 ssl;
    server_name mrb.lutz.bot;

    ssl_certificate     /etc/letsencrypt/live/mrb.lutz.bot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mrb.lutz.bot/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    root /opt/kalshi-mrb/dashboard/dist;
    index index.html;

    # Full API — FastAPI enforces auth on every route except /api/auth/* and /api/public/*.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — client-side routing (/login, /trades, /analytics).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Public front — only the boring /api/public/* endpoints are reachable.
server {
    listen 443 ssl;
    server_name lutz.bot www.lutz.bot;

    ssl_certificate     /etc/letsencrypt/live/lutz.bot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lutz.bot/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    root /opt/kalshi-mrb/dashboard/dist;
    index index.html;

    # Allow only public/auth paths — everything else under /api returns 404.
    location /api/public/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
